<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reference vs Desktop Implementation</title>
    <style>
      body {
        background: #f5f7fa;
        color: #061426;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 24px;
      }

      .comparison {
        align-items: start;
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      img {
        background: #fff;
        border: 1px solid #d7dee8;
        box-shadow: 0 18px 40px rgba(6, 20, 38, 0.12);
        display: block;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="comparison">
      <section>
        <h1>Reference</h1>
        <img src="reference-director-hero.jpg" alt="Supplied hero reference">
      </section>
      <section>
        <h1>Implementation</h1>
        <img src="director-hero-desktop.png" alt="Rendered director hero">
      </section>
    </div>
  </body>
</html>
