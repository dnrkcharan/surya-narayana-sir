<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" aria-labelledby="title desc">
  <title id="title">Education leadership media feature</title>
  <desc id="desc">A clean editorial newspaper-style feature thumbnail for Dr. M.R.S. Suryanarayana Reddy.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf6f5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#c9952f"/>
      <stop offset="1" stop-color="#f3bf5a"/>
    </linearGradient>
    <clipPath id="portraitClip">
      <rect x="48" y="116" width="164" height="214" rx="18"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#061f3c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="720" height="500" rx="32" fill="#edf3f7"/>
  <rect x="24" y="24" width="672" height="452" rx="28" fill="url(#page)" filter="url(#shadow)"/>
  <rect x="24" y="24" width="672" height="58" rx="28" fill="#061f3c"/>
  <path d="M24 62h672v20H24z" fill="#061f3c"/>
  <text x="52" y="61" fill="#ffffff" font-family="Georgia, Times New Roman, serif" font-size="30" font-weight="700">Education Leadership</text>
  <text x="540" y="59" fill="#f3bf5a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">MEDIA FEATURE</text>
  <rect x="48" y="106" width="164" height="236" rx="20" fill="#ffffff" stroke="#ead8af" stroke-width="2"/>
  <image href="dr-reddy-portrait.jpg" x="48" y="116" width="164" height="214" preserveAspectRatio="xMidYMin slice" clip-path="url(#portraitClip)"/>
  <rect x="48" y="285" width="164" height="57" rx="0" fill="#061f3c" opacity="0.86"/>
  <text x="130" y="310" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Dr. M.R.S.</text>
  <text x="130" y="330" text-anchor="middle" fill="#f3bf5a" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800">Suryanarayana Reddy</text>
  <text x="242" y="142" fill="#c9952f" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="900">THE HANS INDIA</text>
  <text x="242" y="198" fill="#061f3c" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700">Education Leader</text>
  <text x="242" y="244" fill="#061f3c" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700">Driving Institutional</text>
  <text x="242" y="290" fill="#061f3c" font-family="Georgia, Times New Roman, serif" font-size="42" font-weight="700">Excellence</text>
  <rect x="242" y="322" width="300" height="5" rx="3" fill="url(#gold)"/>
  <text x="242" y="368" fill="#41516a" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Admissions strategy, academic governance,</text>
  <text x="242" y="398" fill="#41516a" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">branding, and student success.</text>
  <g fill="#cfd9e3">
    <rect x="242" y="430" width="96" height="8" rx="4"/>
